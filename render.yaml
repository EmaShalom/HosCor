# ─────────────────────────────────────────────────────────────────────────────
# HosCor — Render Blueprint
# Deploys: PostgreSQL database + Spring Boot backend + React frontend (static)
#
# First deploy steps:
#   1. Push this repo to GitHub and connect it to Render.
#   2. Render will create all three services automatically.
#   3. If your Render service names differ from the defaults (hoscor-backend /
#      hoscor-frontend), update VITE_API_BASE and CORS_ALLOWED_ORIGINS in the
#      Render dashboard to match the actual service URLs, then redeploy.
#
# Note: Render free-tier web services spin down after 15 min of inactivity.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: hoscor-db
    databaseName: hoscor
    user: hoscor
    plan: free

services:

  # ── Backend (Docker) ────────────────────────────────────────────────────────
  - type: web
    name: hoscor-backend
    runtime: docker
    dockerfilePath: ./hoscor-backend/Dockerfile
    dockerContext: ./hoscor-backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: hoscor-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hoscor-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: hoscor-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: hoscor-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: hoscor-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://hoscor-frontend.onrender.com

  # ── Frontend (Static Site) ──────────────────────────────────────────────────
  - type: web
    name: hoscor-frontend
    runtime: static
    buildCommand: cd hoscor-frontend && npm ci && npm run build
    staticPublishPath: ./hoscor-frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://hoscor-backend.onrender.com
