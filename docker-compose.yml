version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hoscor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Spring Boot) ───────────────────────────────────────────────────
  backend:
    build: ./hoscor-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hoscor
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-hoscor-super-secret-key-2024-cisss-outaouais-hospital-coord}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (React → Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./hoscor-frontend
      # VITE_API_BASE is left unset — nginx proxies /api → backend:8080 internally
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
